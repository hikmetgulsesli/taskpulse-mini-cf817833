<body class="bg-background text-on-background antialiased flex flex-col md:flex-row min-h-screen overflow-hidden">
<!-- Mobile Top Navigation -->
<header class="md:hidden w-full top-0 sticky z-50 bg-surface border-b border-outline-variant flex justify-between items-center px-lg h-12 w-full max-w-full">
<div class="font-display text-display text-primary flex items-center gap-sm">
<span>TaskPulse Mini</span>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:text-primary transition-colors active:opacity-80 transition-all p-xs rounded-full">
<span class="material-symbols-outlined" style="font-size: 20px;">timer</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors active:opacity-80 transition-all p-xs rounded-full">
<span class="material-symbols-outlined" style="font-size: 20px;">notifications</span>
</button>

</div>
</header>
<!-- Mobile Bottom Navigation Shell (Only for primary destinations, suppressed here as Editor is a task-focus flow) -->
<!-- Suppressed due to task-focused intent. -->
<!-- Desktop Side Navigation -->
<nav class="hidden md:flex flex-col h-screen w-64 sticky left-0 top-0 bg-surface-container border-r border-outline-variant p-md gap-sm flex-shrink-0 z-40">
<!-- Header -->
<div class="flex items-center gap-md mb-xl px-sm py-xs">
<div class="w-8 h-8 rounded bg-primary-container flex items-center justify-center text-on-primary-container font-display font-bold">
                T
            </div>
<div>
<h1 class="font-display text-headline-sm text-primary leading-tight">TaskPulse</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant leading-tight">Mini v1.0</p>
</div>
</div>
<!-- Navigation Links -->
<div class="flex flex-col gap-xs flex-grow">
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:bg-surface-container-high rounded-xl font-body-sm text-body-sm hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">dashboard</span>
                Operations
            </a>
<a class="flex items-center gap-md px-sm py-sm bg-primary-container text-on-primary-container rounded-xl font-bold font-body-sm text-body-sm active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">edit_note</span>
                Editor
            </a>
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:bg-surface-container-high rounded-xl font-body-sm text-body-sm hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">query_stats</span>
                Insights
            </a>
<a class="flex items-center gap-md px-sm py-sm text-on-surface-variant hover:bg-surface-container-high rounded-xl font-body-sm text-body-sm hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">settings</span>
                Settings
            </a>
</div>
<!-- CTA & Footer -->
<div class="mt-auto flex flex-col gap-sm">
<button class="w-full bg-primary-container text-on-primary-container hover:bg-inverse-primary py-sm px-md rounded-lg font-body-sm text-body-sm font-medium transition-colors mb-sm flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-size: 18px;">play_arrow</span>
                Start Focus Session
            </button>
<div class="border-t border-outline-variant pt-sm">
<a class="flex items-center gap-md px-sm py-xs text-on-surface-variant hover:bg-surface-container-high rounded-xl font-body-sm text-body-sm hover:bg-surface-container-highest transition-colors" href="#">
<span class="material-symbols-outlined" style="font-size: 18px;">help</span>
                    Help
                </a>
<a class="flex items-center gap-md px-sm py-xs text-on-surface-variant hover:bg-surface-container-high rounded-xl font-body-sm text-body-sm hover:bg-surface-container-highest transition-colors" href="#">
<span class="material-symbols-outlined" style="font-size: 18px;">logout</span>
                    Logout
                </a>
</div>
</div>

<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col h-screen overflow-y-auto bg-surface-dim relative">
<!-- Header -->
<header class="px-xl py-lg flex justify-between items-center border-b border-outline-variant bg-surface sticky top-0 z-30">
<div>
<h2 class="font-display text-headline-sm text-on-surface">Task Editor</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-secondary" style="font-size: 14px;">circle</span>
                    You have unsaved changes
                </p>
</div>
<div class="flex gap-sm">
<button class="h-8 px-md font-body-sm text-body-sm text-on-surface border border-outline-variant rounded hover:border-primary transition-colors bg-transparent">Cancel</button>
<button class="h-8 px-md font-body-sm text-body-sm text-on-primary bg-primary-container hover:bg-inverse-primary rounded transition-colors border border-transparent">Save Task</button>
</div>
</header>
<!-- Editor Form -->
<div class="p-xl max-w-3xl mx-auto w-full flex-grow">
<form class="flex flex-col gap-xl">
<!-- Task Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="taskName">Task Name *</label>
<input class="bg-surface-container border border-outline-variant rounded h-8 px-sm font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary transition-colors placeholder-outline" id="taskName" placeholder="Enter task name" type="text" value="Implement Redux Store"/>
<!-- Validation message hidden by default -->
<!-- <span class="font-body-sm text-body-sm text-error mt-1 flex items-center gap-1"><span class="material-symbols-outlined" style="font-size: 14px;">error</span>Task name is required</span> -->
</div>
<!-- Initial Timer -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="taskTimer">Initial Timer Duration (Min)</label>
<div class="relative w-32">
<input class="bg-surface-container border border-outline-variant rounded h-8 px-sm font-mono-data text-mono-data text-on-surface focus:outline-none focus:border-primary transition-colors w-full" id="taskTimer" max="120" min="1" type="number" value="45"/>
<div class="absolute right-2 top-1/2 -translate-y-1/2 flex flex-col pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" style="font-size: 12px; line-height: 0.5;">arrow_drop_up</span>
<span class="material-symbols-outlined text-outline-variant" style="font-size: 12px; line-height: 0.5;">arrow_drop_down</span>
</div>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-xs flex-grow">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="taskDesc">Description (Optional)</label>
<textarea class="bg-surface-container border border-outline-variant rounded p-sm font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary transition-colors resize-none placeholder-outline" id="taskDesc" placeholder="Add detailed notes, acceptance criteria, or technical requirements..." rows="8"></textarea>
</div>
<!-- Metadata/Tags (Example of Bento Grid style element) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md mt-md border-t border-outline-variant pt-lg">
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-md flex flex-col gap-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Project Assignment</span>
<div class="flex items-center gap-sm">
<div class="w-6 h-6 rounded bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-size: 14px;">folder</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface">Frontend Architecture</span>
</div>
</div>
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-md flex flex-col gap-sm">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Priority Level</span>
<div class="flex items-center gap-sm">
<span class="px-2 py-0.5 rounded-full bg-error-container text-on-error-container font-label-caps text-label-caps uppercase flex items-center gap-1 border border-error/20">
<span class="material-symbols-outlined" style="font-size: 12px;">priority_high</span> High
                             </span>
</div>
</div>
</div>
</form>
</div>
</main>
</body></html>
